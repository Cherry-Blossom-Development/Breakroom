# Rendered by backend/scripts/custom-domain-agent.js — {{DOMAIN}} is substituted
# with the connected custom domain. This HTTP-only stage exists so certbot's
# HTTP-01 challenge has somewhere to answer before a certificate exists; the
# agent overwrites this file with nginx-custom-domain-ssl.template.conf once
# the certificate is issued.
#
# NOTE: this block must never set `default_server` — that directive belongs
# exactly once, on the main prosaurus.com block, permanently. A per-domain
# conf claiming default_server would silently hijack traffic for every
# unmatched Host header on this nginx instance.
server {
    listen 80;
    server_name {{SERVER_NAMES}};

    root /var/www/prosaurus.com;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/prosaurus.com;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
