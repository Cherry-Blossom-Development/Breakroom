# Rendered by backend/scripts/custom-domain-agent.js — {{DOMAIN}} is substituted
# with the connected custom domain, once certbot has successfully issued a
# certificate for it. Replaces nginx-custom-domain-http.template.conf in place.
#
# NOTE: this block must never set `default_server` — see the HTTP template for why.
server {
    listen 80;
    server_name {{SERVER_NAMES}};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name {{SERVER_NAMES}};

    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    root /var/www/prosaurus.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
