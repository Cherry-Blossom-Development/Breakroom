# nginx config for test.prosaurus.com
# Proxies to the prod-test backend (port 3003) which runs production code against breakroom_test DB.
#
# EC2 SETUP - First time only:
#   1. Copy just the port-80 block below to /etc/nginx/conf.d/test.prosaurus.com.conf
#   2. sudo mkdir -p /var/www/test.prosaurus.com
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot certonly --webroot -w /var/www/test.prosaurus.com -d test.prosaurus.com
#   5. Replace the file with the full config below (both 80 + 443 blocks)
#   6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name test.prosaurus.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name test.prosaurus.com;

    ssl_certificate /etc/letsencrypt/live/test.prosaurus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.prosaurus.com/privkey.pem;

    root /var/www/test.prosaurus.com;
    index index.html;

    client_max_body_size 100m;

    location /b/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /blog/view/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /g/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /privacy {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
