# nginx config for dev.prosaurus.com
# Mirrors nginx.ec2.conf but proxies to port 3001 (dev backend) and serves from /var/www/dev.prosaurus.com
#
# EC2 SETUP - First time only:
#   1. Copy just the port-80 block below to /etc/nginx/conf.d/dev.prosaurus.com.conf
#   2. sudo mkdir -p /var/www/dev.prosaurus.com
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot certonly --webroot -w /var/www/dev.prosaurus.com -d dev.prosaurus.com
#   5. Replace the file with the full config below (both 80 + 443 blocks)
#   6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dev.prosaurus.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.prosaurus.com;

    ssl_certificate /etc/letsencrypt/live/dev.prosaurus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.prosaurus.com/privkey.pem;

    # Serve static frontend files
    root /var/www/dev.prosaurus.com;
    index index.html;

    client_max_body_size 100m;

    # Public blog pages - proxied to backend for OG meta tag injection
    location /b/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Authenticated blog view - proxied to backend for OG meta tag injection
    location /blog/view/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public gallery pages - proxied to backend for OG meta tag injection
    location /g/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Privacy policy - proxied to backend for OG meta tag injection
    location = /privacy {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy to dev backend container
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO - WebSocket support
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files redirect to S3
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
