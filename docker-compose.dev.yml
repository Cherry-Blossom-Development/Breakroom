# Docker Compose for dev.prosaurus.com on EC2
# Mirrors docker-compose.ec2.yml but on port 3001 with breakroom_dev database

services:
  backend:
    image: dallascaley/breakroom-backend:latest
    working_dir: /app
    ports:
      # Expose to localhost only on port 3001 (production uses 3000)
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SECRET_KEY: ${SECRET_KEY}
      # AWS SES for email
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Redis configuration
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dev}
      # S3 configuration
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_BUCKET_REGION: ${S3_BUCKET_REGION}
      # Firebase (FCM push notifications)
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    volumes:
      # Mount dev frontend dist so backend can read index.html for OG tag injection
      - /var/www/dev.prosaurus.com:/app/dist:ro
    restart: unless-stopped
    command: sh -c "npm run start"
